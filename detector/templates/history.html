<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction History</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f6d365, #fda085);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #fda085;
            color: white;
        }
        td:last-child, th:last-child {
            text-align: center;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #004aad;
            font-weight: bold;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
        .bottom-links {
            text-align: center;
            margin-top: 25px;
        }
        .download-btn {
            background: #0078D7;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }
        .download-btn:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📜 Prediction History</h2>
        {% if history %}
        <table>
            <tr>
                <th>Message</th>
                <th>Type</th>
                <th>Result</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
            {% for h in history %}
            <tr>
                <td>{{ h.message }}</td>
                <td>{{ h.type }}</td>
                <td>{{ h.result }}</td>
                <td>{{ h.time }}</td>
                <td>
                    <form method="POST" action="{% url 'delete_history' forloop.counter0 %}" style="margin:0;">
                        {% csrf_token %}
                        <button type="submit" class="delete-btn"
                            onclick="return confirm('Are you sure you want to delete this record?')">
                            🗑 Delete
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No prediction history available yet.</p>
        {% endif %}

        <a href="{% url 'index' %}">⬅ Back to Home</a>
    </div>

    <div class="bottom-links">
        <a href="{% url 'export_excel' %}" class="download-btn">
            📥 Download Excel Report
        </a>
    </div>
</body>
</html>
